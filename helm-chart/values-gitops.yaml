image:
  repository: 238845559349.dkr.ecr.us-east-2.amazonaws.com/node-app-repository
  pullPolicy: IfNotPresent

service:
  type: LoadBalancer
  port: 5000

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 200m
    memory: 256Mi

autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 50

namespaceOverride: gitops-deploy
